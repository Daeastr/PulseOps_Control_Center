name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages
        run: |
          HTTP_STATUS=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/pages \
            -f build_type=workflow \
            --silent --include 2>&1 | grep "^HTTP" | awk '{print $2}')
          if [ "$HTTP_STATUS" = "201" ]; then
            echo "GitHub Pages enabled successfully."
          elif [ "$HTTP_STATUS" = "409" ] || [ "$HTTP_STATUS" = "422" ]; then
            echo "GitHub Pages is already enabled."
          else
            echo "Could not enable GitHub Pages automatically (status: ${HTTP_STATUS:-unknown})."
            echo "Please enable it manually: repo Settings → Pages → Source → GitHub Actions."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
