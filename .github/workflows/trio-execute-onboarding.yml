# trio-execute-onboarding.yml
#
# PARTY REPO EXECUTOR — add this file to each of the three TRIO party repos:
#   SimuStream_Enterprise   →  .github/workflows/trio-execute-onboarding.yml
#   Scaltonomic_Al_Portal   →  .github/workflows/trio-execute-onboarding.yml
#   Mock_test_lab           →  .github/workflows/trio-execute-onboarding.yml
#
# What it does:
#   1. Triggers when the TRIO Engine posts (or updates) an issue titled
#      "[TRIO Signal] ..."
#   2. Extracts the ```json block (between TRIO_SIGNAL_PAYLOAD_START/END markers)
#   3. Writes execution_spec to trio/onboarding.json in this repo
#   4. Commits and pushes — making the onboarding spec live in the party repo
#
# The execution_spec contains resolved values (no {{PLACEHOLDERS}}):
#   id, name, description, status, appUrl, simustream URLs, tags, etc.
#
# Source template: https://github.com/Daeastr/Simustream_TRIO_Engine/blob/main/.github/party-repo-workflows/trio-execute-onboarding.yml

name: Execute TRIO onboarding signal

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write

jobs:
  apply:
    if: startsWith(github.event.issue.title, '[TRIO Signal]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract execution_spec from TRIO signal issue
        run: |
          python3 - <<'PY'
          import json, os, re, pathlib, sys

          event_path = os.environ.get("GITHUB_EVENT_PATH", "")
          if not event_path or not os.path.exists(event_path):
              print("ERROR: GITHUB_EVENT_PATH not set or file missing", file=sys.stderr)
              sys.exit(1)

          event = json.load(open(event_path, encoding="utf-8"))
          body = event.get("issue", {}).get("body") or ""

          # Primary: extract between sentinel comments
          m = re.search(
              r"<!--\s*TRIO_SIGNAL_PAYLOAD_START\s*-->\s*```json\s*\n(.*?)\n```\s*<!--\s*TRIO_SIGNAL_PAYLOAD_END\s*-->",
              body, re.S
          )
          if not m:
              # Fallback: any ```json block
              m = re.search(r"```json\s*\n(.*?)\n```", body, re.S)
          if not m:
              print("ERROR: No JSON payload block found in issue body", file=sys.stderr)
              sys.exit(1)

          payload = json.loads(m.group(1))

          # execution_spec is the canonical resolved onboarding spec
          spec = payload.get("execution_spec") or payload

          out_dir = pathlib.Path("trio")
          out_dir.mkdir(exist_ok=True)

          # Write the full spec
          spec_path = out_dir / "onboarding.json"
          spec_path.write_text(json.dumps(spec, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"Wrote {spec_path}  (app_id={spec.get('id', '?')}, status={spec.get('status', '?')})")

          # Write the envelope metadata (source, triggered_at, event_type) separately
          envelope = {k: v for k, v in payload.items() if k != "execution_spec"}
          envelope_path = out_dir / "signal-envelope.json"
          envelope_path.write_text(json.dumps(envelope, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"Wrote {envelope_path}")

          # Write human-readable STATUS.md for GitHub browsing
          sim = spec.get("simustream") or {}
          landing = sim.get("landingPageUrl") or ""
          scaled  = sim.get("scaledSimulationUrl") or ""
          landing_cell = f"[{landing}]({landing})" if landing else "N/A"
          scaled_cell  = f"[{scaled}]({scaled})"   if scaled  else "N/A"

          status_val = spec.get("status", "unknown")
          issue_url  = event.get("issue", {}).get("html_url", "")
          engine_url = "https://github.com/Daeastr/Simustream_TRIO_Engine"

          status_lines = [
              "# TRIO Onboarding Status",
              "",
              "| Field | Value |",
              "|---|---|",
              f"| **App ID** | `{spec.get('id', '?')}` |",
              f"| **Name** | {spec.get('name', '?')} |",
              f"| **Onboarding Status** | `{status_val}` |",
              f"| **Version** | {spec.get('version', '?')} |",
              f"| **Last Signal** | `{envelope.get('triggered_at', '?')}` |",
              f"| **Event Type** | `{envelope.get('event_type', '?')}` |",
              "",
              "## SimuStream URLs",
              "",
              "| | URL |",
              "|---|---|",
              f"| **Landing Page** | {landing_cell} |",
              f"| **Scaled Simulation** | {scaled_cell} |",
              "",
              "## Links",
              "",
              f"- [TRIO Signal Issue]({issue_url})",
              f"- [TRIO Engine]({engine_url})",
              "",
              "---",
              f"*Generated by trio-execute-onboarding - {envelope.get('triggered_at', '')}*",
          ]
          status_path = out_dir / "STATUS.md"
          status_path.write_text("\n".join(status_lines) + "\n", encoding="utf-8")
          print(f"Wrote {status_path}")
          PY

      - name: Commit onboarding spec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trio/onboarding.json trio/signal-envelope.json trio/STATUS.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(trio): apply TRIO onboarding signal

          Source: ${{ github.event.issue.html_url }}
          Event:  ${{ github.event.issue.title }}"
          git pull --rebase origin ${{ github.event.repository.default_branch }}
          git push
